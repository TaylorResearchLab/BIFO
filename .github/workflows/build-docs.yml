name: Build documentation PDF

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'implementations/**'
      - 'README.md'
      - 'CHANGELOG.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended

      - name: Get version from CHANGELOG
        id: version
        run: |
          VERSION=$(grep -m1 '^## v' CHANGELOG.md | sed 's/## //' | awk '{print $1}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build combined documentation PDF
        run: |
          pandoc \
            README.md \
            docs/entity_classes.md \
            docs/curie_mapping.md \
            docs/flow_classes.md \
            docs/admissibility.md \
            docs/conditioning_protocol.md \
            docs/confidence_provenance.md \
            implementations/ddkg/IMPLEMENTATION_GUIDE.md \
            -o BIFO_Documentation_${{ steps.version.outputs.version }}.pdf \
            --pdf-engine=xelatex \
            --toc \
            --toc-depth=2 \
            --number-sections \
            -V geometry:margin=1in \
            -V fontsize=11pt \
            -V title="Biological Information Flow Ontology" \
            -V subtitle="Specification and DDKG Implementation Guide ${{ steps.version.outputs.version }}" \
            -V date="$(date +%Y-%m-%d)" \
            -V author="Taylor Research Lab, CHOP / University of Pennsylvania"

      - name: Commit PDF to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BIFO_Documentation_*.pdf
          git diff --staged --quiet || \
            git commit -m "docs: auto-build documentation PDF [${{ steps.version.outputs.version }}]"
          git push
